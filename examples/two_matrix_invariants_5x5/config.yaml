# OpenEvolve configuration for two generic 5x5 matrix invariants.
max_iterations: 1000
checkpoint_interval: 20
log_level: "INFO"
language: "python"
file_suffix: ".py"
diff_based_evolution: true
max_code_length: 24000

llm:
  backend: "codex"
  models:
    - name: "codex"
      weight: 1.0
  temperature: 0.8
  max_tokens: 12000
  timeout: 180

prompt:
  system_message: |
    You are an expert in invariant theory, computational algebra, trace algebras,
    and symbolic computation.

    Problem setup:
    Let X=(x_ij) and Y=(y_ij) be two generic 5-by-5 matrices over the real
    polynomial ring A = R[x_ij, y_ij]. Let G be the subalgebra of Mat_5(A)
    generated by all diagonal real matrices and by X and Y. Let C be the center
    of G, and let D = Frac(C), identified here with the GL_5 invariant rational
    functions for simultaneous conjugation g.(X,Y)=(gXg^-1,gYg^-1).

    Optimization task:
    Improve build_candidate() inside the EVOLVE-BLOCK. Return three objects:
    - g: an element of G, represented as a callable, a word such as "XYX", or
      a structured expression using words, sums, products, commutators, scalar
      multiples, and real diagonal matrices.
    - f: the evaluator will force this to be the characteristic polynomial
      det(tI-g) of g, regardless of what the candidate returns.
    - h: a degree-at-most-4 polynomial function h(t), represented as high-to-low
      coefficients [b0,b1,b2,b3,b4] or as a callable returning such
      coefficients.

    Primary goal:
    The final evaluation function is a sum of four parts:
      part1 = lambda_eval_to_zero * sum_{i=0}^4 eval_f_of_elem(f(t), h^{circ i}(g)).
      part2 = lambda_sep * sep_measure(f(t)).
      part3 = lambda_orbit_zeroes_f * extended_eval_f_of_elem(
        product_{i=0}^4 (z - h^{circ i}(t)) - f(z), g).
      part4 = lambda_not_central /
        (eval_f_of_elem(t - trace(g)/5, g) + epsilon).
    eval_f_of_elem samples many real matrix specializations X->A, Y->B and
    computes the root-mean-square normalized matrix 2-norm of f(r). The
    denominator is the sum of matrix 2-norms of the individual terms
    a0*r^5, a1*r^4, ..., a5*I after specialization.
    sep_measure evaluates the monic quintic discriminant over random
    specializations and normalizes abs(discriminant(f)) by the sum of absolute
    values of its 59 monic discriminant terms. The weights
    lambda_eval_to_zero, lambda_sep, lambda_orbit_zeroes_f, and
    lambda_not_central default to 1.0 and can be changed with the
    LAMBDA_EVAL_TO_ZERO, LAMBDA_SEP, LAMBDA_ORBIT_ZEROES_F, and
    LAMBDA_NOT_CENTRAL environment variables. The extended evaluator samples
    X->A, Y->B, and z->C, evaluates the bivariate relation at (g,C), and
    normalizes by the sum of matrix norms of the relation's coefficient
    matrices after z=C is substituted. The not-central epsilon defaults to
    1e-6 and can be changed with NOT_CENTRAL_EPSILON.

    Available symbolic algebra tools:
    The seed program exposes available_symbolic_tools() and
    run_symbolic_tool(tool_name, script, timeout=30). Agents may use installed
    systems named sage, macaulay2, gap, singular, pari_gp, magma, julia_oscar,
    and wolfram. The evaluator also reports which of these are visible on PATH
    or through SAGE, M2, GAP, SINGULAR, GP, MAGMA, JULIA, and WOLFRAMSCRIPT
    environment variables.

    Useful directions:
    - f must be monic: its leading coefficient should evaluate to 1.
    - Coefficients of f and h may be constants or central/invariant functions
      evaluated from X and Y at each random specialization.
    - h may have degree less than 4 while the remaining evaluation parts are
      still being added, but it must be represented with five high-to-low
      coefficients.
    - Matrix elements may be callables (X,Y)->matrix or structured dictionaries.
    - Use symbolic tools to derive identities, characteristic polynomials, or
      nontrivial h dynamics, then keep the evolved Python evaluator-facing code
      deterministic and numerically stable.
  include_artifacts: true
  max_artifact_bytes: 20000
  num_top_programs: 4
  num_diverse_programs: 3

database:
  population_size: 80
  archive_size: 40
  num_islands: 4
  migration_interval: 20
  feature_dimensions:
    - "objective_loss"
    - "not_central_measure"
    - "orbit_zeroes_measure"
  feature_bins:
    objective_loss: 12
    not_central_measure: 10
    orbit_zeroes_measure: 10
  random_seed: 42

evaluator:
  timeout: 180
  max_retries: 1
  cascade_evaluation: true
  cascade_thresholds:
    - 0.3
  parallel_evaluations: 1
  enable_artifacts: true

early_stopping_metric: "combined_score"
