# OpenEvolve configuration for evaluation_2.py.
#
# Run with:
# python openevolve-run.py \
#   examples/two_matrix_invariants_5x5/initial_program.py \
#   examples/two_matrix_invariants_5x5/evaluation_2.py \
#   --config examples/two_matrix_invariants_5x5/config_2.yaml

max_iterations: 1000
checkpoint_interval: 20
log_level: "INFO"
language: "python"
file_suffix: ".py"
diff_based_evolution: true
max_code_length: 26000

llm:
  backend: "codex"
  models:
    - name: "codex"
      weight: 1.0
  temperature: 0.8
  max_tokens: 12000
  timeout: 600

prompt:
  system_message: |
    You are an expert in invariant theory, computational algebra, trace algebras,
    and symbolic computation.

    Problem setup:
    Let X=(x_ij) and Y=(y_ij) be two generic 5-by-5 matrices over
    A = R[x_ij, y_ij]. Let G be the subalgebra of Mat_5(A) generated by all
    diagonal real matrices and by X and Y. Let C be the center of G, and let
    D = Frac(C), identified numerically with the invariant rational field for
    simultaneous conjugation.

    Optimization task:
    Improve build_candidate() inside the EVOLVE-BLOCK. Return:
    - g: an element of G, represented as a callable, word, or structured
      expression.
    - f: a returned monic degree-5 polynomial. evaluation_2.py uses this f;
      it does not replace f by charpoly(g).
    - h: a degree-at-most-4 polynomial with coefficients in the center,
      represented by five high-to-low coefficients or a callable returning them.

    Main objective:
    Find g,h,f such that g is non-central, D[g] has degree 5 over D, f is close
    to the degree-5 minimal polynomial of g, and h acts like a cyclic order-5
    Galois automorphism on the roots of f.

    evaluation_2.py rewards:
    - g behaving like an element of G, numerically guarded as a real rational
      function of X,Y: deterministic, real finite 5x5 output, no dependence on
      base_value/current_value evaluator context, no RNG dependence, no X/Y
      mutation, and local continuity on generic samples.
    - f(h^i(g)) close to zero for i=0,...,4.
    - f close to charpoly(g). Together with degree5_measure, this makes f close
      to the minimal polynomial of g.
    - product_i (z - h^i(t)) close to f(z).
    - Newton power sums of h^i(g) matching the Newton sums from f.
    - f(h(t)) = 0 and h^5(t) = t in the quotient D[t]/(f).
    - h^5(g) close to g, with h^i(g) distinct for i=0,...,4.
    - nonzero discriminant, so repeated-root degeneracies are bad.
    - I,g,g^2,g^3,g^4 numerically independent, so g has degree 5.
    - g non-central and actually dependent on X,Y, avoiding constant diagonal
      or tiny-scale loopholes.

    Useful directions:
    - Make f monic with six high-to-low coefficients.
    - Make g a deterministic expression in X,Y and real constants only. Avoid
      random numbers, time/global state, side effects, or dependence on optional
      evaluator context arguments.
    - A good f should usually be computed from central invariants of g, often
      by characteristic_polynomial_of_g(g), but hand-built or symbolic formulas
      are allowed.
    - h should be nontrivial: identity and constant h are heavily penalized by
      cycle_distinct_loss.
    - Avoid tiny rescalings of g; evaluation_2.py has a relative-scale barrier.
    - Keep build_candidate() and exploratory helper code fast. Avoid
      per-specialization optimization loops, large grid searches, or expensive
      symbolic calls inside the returned candidate.
    - Use available_symbolic_tools() and run_symbolic_tool(name, script) if a
      symbolic system is installed.

    Weight environment variables:
    Each weight can be overridden with either NAME or EVAL2_NAME. Important
    names include LAMBDA_G_IN_G, LAMBDA_CHARPOLY_MATCH, LAMBDA_DEGREE5,
    LAMBDA_SEPARABLE, LAMBDA_CYCLE_DISTINCT, LAMBDA_NOT_CENTRAL,
    LAMBDA_XY_DEPENDENCE, LAMBDA_NEWTON_SUMS, and
    LAMBDA_QUOTIENT_AUTOMORPHISM.
  include_artifacts: true
  max_artifact_bytes: 20000
  num_top_programs: 4
  num_diverse_programs: 3

database:
  population_size: 80
  archive_size: 40
  num_islands: 4
  migration_interval: 20
  feature_dimensions:
    - "objective_loss"
    - "degree5_measure"
    - "cycle_distinct_measure"
    - "xy_dependence_measure"
  feature_bins:
    objective_loss: 12
    degree5_measure: 10
    cycle_distinct_measure: 10
    xy_dependence_measure: 10
  random_seed: 42

evaluator:
  timeout: 600
  max_retries: 1
  cascade_evaluation: true
  cascade_thresholds:
    - 0.02
  parallel_evaluations: 1
  enable_artifacts: true

early_stopping_metric: "combined_score"
